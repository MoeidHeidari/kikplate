name: Release Helm Chart

on:
  push:
    branches:
      - helm
    paths:
      - "helm/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Package & Publish to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Package chart
        run: |
          mkdir -p ./dist/charts
          helm package helm/ --destination ./dist/charts

      - name: Generate index.yaml
        run: |
          helm repo index ./dist/charts \
            --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/charts

      - name: Copy landing page
        run: |
          cp helm/index.html ./dist/index.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
          commit_message: "chore: update helm chart index [skip ci]"
